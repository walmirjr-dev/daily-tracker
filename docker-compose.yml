services:
  db:
    image: postgres:15-alpine
    container_name: daily-db
    environment:
      POSTGRES_DB: dailytracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dailytracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - daily-network

  backend:
    build: .
    container_name: daily-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dailytracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      TZ: America/Sao_Paulo
    networks:
      - daily-network

  frontend:
    build: ../daily-tracker-frontend
    container_name: daily-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      TZ: America/Sao_Paulo
    networks:
      - daily-network

  prometheus:
    image: prom/prometheus:latest
    container_name: daily-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    networks:
      - daily-network

  loki:
    image: grafana/loki:3.0.0
    container_name: daily-loki
    ports:
      - "3100:3100"
    networks:
      - daily-network

  grafana:
    image: grafana/grafana:latest
    container_name: daily-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - daily-network

volumes:
  pgdata:
  grafana-data:

networks:
  daily-network:
    driver: bridge